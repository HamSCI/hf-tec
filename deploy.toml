# hf-tec deploy manifest — declares how this client gets from
# repo source to its production location. Conforms to the HamSCI client
# contract v0.8 (sigmond/docs/CLIENT-CONTRACT.md).

[package]
name             = "hf-tec"
version          = "0.1.0"
description      = "HF PRN-coded beacon recorder for ionospheric specification"
contract_version = "0.8"
license          = "MIT"

# ---------------------------------------------------------------------------
# Build phase: install Python package into a venv at
# /opt/hf-tec/venv. Sigmond's shared ensure_uv helper builds the
# venv via uv (see scripts/install.sh).
# ---------------------------------------------------------------------------

[build]
steps = [
    "/opt/git/sigmond/hf-tec/scripts/install.sh --build-only",
]
produces = [
    "/opt/hf-tec/venv/bin/hf-tec",
]

# ---------------------------------------------------------------------------
# Configuration interview (CONTRACT-v0.5 §14). Wizard not implemented yet;
# operator hand-edits the config file.
# ---------------------------------------------------------------------------

# [contract.config]
# init = "scripts/config-init.sh"
# edit = "scripts/config-edit.sh"

# ---------------------------------------------------------------------------
# Install phase: place files at FHS-compliant locations on the target.
# ---------------------------------------------------------------------------

[install]

[[install.steps]]
kind = "link"
src  = "/opt/hf-tec/venv/bin/hf-tec"
dst  = "/usr/local/bin/hf-tec"

[[install.steps]]
kind = "link"
src  = "systemd/hf-tec@.service"
dst  = "/etc/systemd/system/hf-tec@.service"

[[install.steps]]
kind      = "render"
src       = "config/hf-tec-config.toml.template"
dst       = "/etc/hf-tec/hf-tec-config.toml"
mode      = "0640"
owner     = "hftec:hftec"
if_absent = true

[[install.steps]]
kind  = "mkdir"
dst   = "/etc/hf-tec/data"
mode  = "0755"
owner = "hftec:hftec"

# stations.toml lives in a data/ subdirectory so sigmond's per-instance
# scanner — which globs /etc/<client>/*.toml — does not misread it as
# the "stations" instance.
[[install.steps]]
kind      = "render"
src       = "data/stations.toml"
dst       = "/etc/hf-tec/data/stations.toml"
mode      = "0644"
owner     = "hftec:hftec"
if_absent = true

[[install.steps]]
kind  = "mkdir"
dst   = "/var/lib/hf-tec"
mode  = "0755"
owner = "hftec:hftec"

[[install.steps]]
kind  = "mkdir"
dst   = "/var/log/hf-tec"
mode  = "0755"
owner = "hftec:hftec"

# ---------------------------------------------------------------------------
# Systemd units sigmond should know about for start/stop/status.
# ---------------------------------------------------------------------------

[systemd]
units = []
templated_units = [
    "hf-tec@.service",
]

# ---------------------------------------------------------------------------
# Dependencies sigmond should ensure are present before installing this
# client.
# ---------------------------------------------------------------------------

[deps]

[[deps.git]]
name       = "ka9q-python"
url        = "https://github.com/ka9q/ka9q-python.git"
install_to = "/opt/git/sigmond/ka9q-python"
commit     = ""   # track main; sigmond warns on drift

[[deps.system]]
packages = [
    "python3",
    "python3-venv",
    "python3-pip",
]

# ---------------------------------------------------------------------------
# Sigmond UI hooks (drop-in registration for `smd watch` + TUI Activity).
# Consumed by lib/sigmond/client_features.py — without this block the
# client wouldn't appear in `smd tui` Monitoring → Activity, even if the
# CLI verb is implemented.
# ---------------------------------------------------------------------------

[client_features.watch]
verb         = "hf-tec"
description  = "hf-tec PRN-beacon detection records (per freq/window)"
verbose      = true
per_instance = true

[client_features.receiver_channels]
description  = "PRN-beacon RF channels (one per enabled [[frequency]])"
per_instance = true
parser_file  = "src/hf_tec/sigmond_tui.py"
parser_attr  = "parse_receiver_channels"
