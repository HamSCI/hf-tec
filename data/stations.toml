# HF beacon network — transmitter and receiver sites.
#
# This network is being re-established in North America under the
# leadership of Dr. David Hysell at Cornell University.  The original
# Hysell network in Peru, documented in Hysell et al. (2018, JGR Space
# Physics 123:6851–6864) and Aricoche & Hysell (2024, JGR ML&C 1), is
# no longer the active transmit infrastructure; the documentation in
# those papers describes the methodology and DSP chain that the
# present North American deployment reuses.
#
# Update this file as the network expands.  The recorder reads the
# `transmitters` section to know which (Tx, frequency) replicas to
# build.  The `receivers` section is informational; the local
# receiver identifies itself via the `[station]` block in the main
# config file.
#
# Source for the current entries: direct correspondence with
# Dr. Hysell, 2026-05-29 (forwarded by AC0G).

# ---------------------------------------------------------------------------
# Transmit sites
# ---------------------------------------------------------------------------
#
# All three Alaska sites emit both frequencies simultaneously and use
# a distinct per-site PRN seed (passed to Hysell's
# `create_pseudo_random_code(clen, seed)` routine).  The seed→site
# mapping is canonical — do not renumber.

[transmitters.POKER_FLAT]
name           = "Poker Flat, Alaska"
status         = "operational"
# 65° 07' 03" N, 147° 25' 55" W  (Hysell, 2026-05-29).
latitude_deg   = 65.1175
longitude_deg  = -147.4319
altitude_m     = 0.0              # to-confirm
power_watts    = 0.5              # per-frequency continuous power
antenna        = "inverted-V (assumed; confirm with operator)"
frequencies_hz = [2_900_000, 3_400_000]
prn_seed       = 0
notes          = "Coordinates provided by Dr. Hysell (DMS converted)."

[transmitters.GAKONA]
name           = "Gakona, Alaska"
status         = "operational"
# 62° 23' 21" N, 145° 08' 09" W  (Hysell, 2026-05-29).
latitude_deg   = 62.3892
longitude_deg  = -145.1358
altitude_m     = 0.0              # to-confirm
power_watts    = 0.5
antenna        = "inverted-V (assumed; confirm with operator)"
frequencies_hz = [2_900_000, 3_400_000]
prn_seed       = 1
notes          = "Coordinates provided by Dr. Hysell (DMS converted)."

[transmitters.PALMER]
name           = "Palmer, Alaska"
status         = "down-for-maintenance"
# 61° 33' 56" N, 149° 15' 06" W  (Hysell, 2026-05-29).
latitude_deg   = 61.5656
longitude_deg  = -149.2517
altitude_m     = 0.0              # to-confirm
power_watts    = 0.5
antenna        = "inverted-V (assumed; confirm with operator)"
